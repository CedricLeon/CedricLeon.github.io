<!-- Contents of <head>: metadata + stylesheet. Page <title> is the page's own
     title plus the site name; description falls back to the site default. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title | escape }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description | escape }}">
<link rel="stylesheet" href="/style.css">
